version = 1

# Default status for new tasks. Tickets stay `draft` until approved —
# `coga launch` activates a draft inline, or `coga mark active` activates
# it without launching.
default_status = "draft"

# --- Agents ---
# Agent types. Each defines the CLI binary and how to invoke it.
# Removed headless-agent keys (`auto`, `skip_permissions`,
# `skip_permissions_argv`) fail config load with a migration
# error — delete those lines if upgrading from coga 0.2.0.

[agents.claude]
cli = "claude"
file = "CLAUDE.md"
mode = "local"
# `claude -n <name>` sets the session display name shown in the /resume
# picker, the prompt box, and the terminal title. Skipped in discussion
# launches so the human's first ask names the session.
name_flag = "-n"
# `claude --session-id <uuid>` lets Coga deterministically recover the
# transcript usage for exactly the session it launched.
session_id_flag = "--session-id"
# `discussion` rides the composed prompt as system context for discussion
# sessions (`coga chat`, `coga ticket`) so the human's first ask becomes
# the session title instead of a 20KB Coga prompt.
discussion = "--append-system-prompt {prompt}"

[agents.codex]
cli = "codex"
file = "AGENTS.md"
mode = "local"
discussion = "-c developer_instructions={prompt}"

# --- Notification channels ---
# Coga's notification system is the team sync point. It is optional on first
# run: a fresh repo ships with no channels selected, so a brand-new user can
# run draft/mark/launch/bump without configuring anything. Turn it on when you
# start coordinating with other people.
#
# Slack is the first channel: urgent/manual events post through the Slack
# webhook, while outcome events may spool into the daily digest before that
# digest posts to Slack. Relaunching an already-in-progress ticket does not
# post. Once Slack is selected it is fail-loud — a missing/revoked/unreachable
# webhook crashes the command rather than dropping the message silently.
#
# To opt in, select the channel and point it at a webhook. Use `env:`
# indirection so the URL (a bearer token) stays out of this committed file —
# export SLACK_WEBHOOK_URL locally and coga resolves it:
#
#   [notification]
#   channels = ["slack"]
#
#   [notification.slack]
#   webhook = "env:SLACK_WEBHOOK_URL"
#
# A machine-specific webhook can override this in coga.local.toml (local wins),
# e.g. a literal URL there for a personal channel. Never commit a real URL.
# `coga validate --check-slack` probes the webhook so dead URLs surface
# at config time, not at first bump. A bare exported SLACK_WEBHOOK_URL with no
# `webhook` key is only a deprecated compatibility fallback.
#
# Already opted in but want Slack temporarily silent (solo runs, dev/test, CI
# without notifications)? Keep the channel selected and set in coga.local.toml:
#   [notification.slack]
#   enabled = false
[notification]
channels = []

# Optional Slack extras, active once you opt in above:
#
# Route alerts to a second channel. Posts that need a human to go do
# something (`coga slack --important`) go to `important_webhook`; ordinary
# state transitions stay on `webhook`. Same `env:` indirection, same reason.
# Once you call `--important`, set this: with it unset an `--important` post
# crashes rather than rerouting to `webhook`, since a human-action alert in the
# wrong channel is worse than a crash that gets the config fixed. Example:
#   [notification.slack]
#   important_webhook = "env:COGA_IMPORTANT_WEBHOOK_URL"
#
# Pick who those `--important` posts @ for triage. By default `--important`
# pings the ticket's owner — whoever filed it, not necessarily whoever should
# act. Name one triage owner here and every `--important` post @'s them instead.
# It is a coga name (the same token used in `owner` / `[notification.slack.users]`),
# not a member ID and not a secret, so no `env:` indirection. Unset, the owner
# mention stands. Example:
#   [notification.slack]
#   important_recipient = "triage-owner"
#
# Attach a GIF to milestone events. One URL is picked at random
# per post. Skip a kind (or leave its list empty) to keep that event
# text-only. Example:
#   [notification.slack.gifs]
#   done  = ["https://media.giphy.com/media/<id>/giphy.gif"]
#   block = [
#     "https://media.giphy.com/media/<id-a>/giphy.gif",
#     "https://media.giphy.com/media/<id-b>/giphy.gif",
#   ]
#
# Optional: map a coga name (the token used in a ticket's `owner` /
# `watchers` fields) to a Slack member ID. With a mapping, that person
# gets a real `<@…>` ping on posts about their ticket — owners inline,
# watchers cc'd. Without one they're still named, just in plain text (no
# ping). An incoming webhook can't look an ID up itself, so it has to be
# listed here. Grab an ID from Slack: profile → ⋮ (More) → Copy member ID.
#   [notification.slack.users]
#   marc = "U01ABC234"
#   ada  = "U05XYZ789"

# --- Git sync ---
# The git analogue of Slack: every command that mutates ticket state commits
# the resolved task directory under `coga/tasks/` and pushes it to the
# control branch, so the git-backed repo never drifts from the team's live state.
# Always-on — these defaults apply even with no `[git]` table.
#
# When HEAD is the control branch the task files are committed and pushed; on
# a feature branch (or detached HEAD) the same files are landed on the control
# branch via a working-tree-free plumbing path. A failed commit/push is
# non-fatal: it is surfaced to stderr + the task's log.md, but never aborts the
# local state transition (the on-disk markdown is the source of truth; git is
# only the sync layer, so a push that can't reach a protected/remote control
# branch must not block a `bump` / `mark` / launch).
#
# Defaults: enabled = true, remote = "origin", control_branch = "main".
# To opt out (a repo with no remote: dev/test, CI, solo branches), set
# `enabled = false` here or in coga.local.toml (local overrides shared,
# like [notification.slack]):
#   [git]
#   enabled = false

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded coga command (free-form string). Positional args after the
# alias name are forwarded to the expansion. Alias names cannot collide
# with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
# `build` is first-run onboarding — it launches the packaged `coga-build`
# ticket (one question → agent-led chat → vision → starter tickets). Requires
# an already-init'd repo; `coga init` captures your name beforehand.
build = "launch coga-build"
# `pick` opens the interactive megalaunch picker — a memorable name for
# `coga megalaunch --pick`. A trailing directory still scopes it
# (`coga pick marketing`).
pick = "megalaunch --pick"
# `dream` creates the `recurring/dream/` cleanup task and launches it now —
# the same path `coga recurring launch dream` takes.
dream = "recurring launch dream"
# Uncomment to add per-agent shortcuts. The --agent value must match an
# `[agents.*]` block above.
# claude = "launch bootstrap/orient --agent claude"
# codex = "launch bootstrap/orient --agent codex"

# --- Extensions ---
# A repo-owned, free-form namespace coga does not interpret. Put repo-specific
# config your own skills/scripts read here — anything that isn't part of coga's
# fixed schema. coga accepts it verbatim (like [aliases]/[secrets]) and never
# validates the keys, so nested tables and arbitrary values are fine. Read it
# via `load_config().extensions["<ns>"]` or by parsing coga.toml directly.
# [extensions.patent]
# calendar_id = "<your-google-calendar-id>"
